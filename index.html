<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Edith">
<meta name="theme-color" content="#ffffff">
<title>Edith</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --border: #e8e8e4; --border2: #d0d0cb;
  --text: #1c1c1a; --text2: #6b6b62; --text3: #adadA3;
  --bubble-user: #f2f2ef; --send-bg: #1c1c1a; --input-bg: #f2f2ef;
}
html { height: 100%; }
body { height: 100%; margin: 0; font-family: 'Inter', -apple-system, sans-serif; color: var(--text); background: #fff; overflow: hidden; display: flex; flex-direction: column; }

.msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
.msg-group.user { align-items: flex-end; }
.msg-group.assistant { align-items: flex-start; }
.bubble { padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; border: 1px solid var(--border); }
.msg-group.user .bubble { background: var(--bubble-user); border-bottom-right-radius: 4px; max-width: 78%; }
.msg-group.assistant .bubble { background: #fff; border-bottom-left-radius: 4px; max-width: 86%; }
.bubble.typing { padding: 14px 18px; background: #fff; }
.dots { display: flex; gap: 5px; align-items: center; }
.dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: bop 1.3s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: 0.15s; }
.dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bop { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
.msg-time { font-size: 11px; color: var(--text3); padding: 0 4px; margin-top: 3px; }
.bubble.error { background: #fff5f5; border-color: #fecaca; color: #dc2626; }

/* attachment preview badge */
.attach-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: #f0f0ec; border: 1px solid var(--border2);
  border-radius: 10px; padding: 5px 10px; font-size: 13px;
  color: var(--text2); margin-bottom: 6px; max-width: 220px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.attach-badge svg { flex-shrink: 0; }
.attach-badge .rm { cursor: pointer; margin-left: 4px; color: var(--text3); font-size: 15px; line-height: 1; }
.attach-badge .rm:hover { color: var(--text); }

/* attachment area above input */
.attach-area {
  display: none; padding: 6px 6px 0 6px;
}
.attach-area.visible { display: block; }

/* Drive picker modal */
.drive-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.35); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.drive-modal-overlay.open { display: flex; }
.drive-modal {
  background: #fff; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 580px; padding: 20px 20px 32px;
  max-height: 70vh; display: flex; flex-direction: column;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
}
.drive-modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.drive-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
.drive-search-row input {
  flex: 1; font-family: inherit; font-size: 15px;
  padding: 9px 14px; border: 1px solid var(--border); border-radius: 12px;
  outline: none;
}
.drive-search-row input:focus { border-color: var(--border2); }
.drive-search-row button {
  background: var(--send-bg); color: #fff; border: none;
  border-radius: 12px; padding: 0 16px; font-family: inherit;
  font-size: 14px; cursor: pointer;
}
.drive-results { overflow-y: auto; flex: 1; }
.drive-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  font-size: 14px; color: var(--text);
}
.drive-item:hover { background: var(--bubble-user); }
.drive-item .di-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.drive-item .di-type { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.drive-modal-close {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--text3); padding: 4px 8px;
  border-radius: 8px; font-family: inherit; margin-bottom: 4px;
  align-self: flex-end;
}
.drive-empty { color: var(--text3); font-size: 14px; text-align: center; padding: 24px 0; }

/* icon buttons (attach + drive) */
.icon-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px; border-radius: 8px; color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: color 0.15s;
}
.icon-btn:hover { color: var(--text2); }
.icon-btn.active { color: var(--text); }

.confirm-card { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 16px; border-bottom-left-radius: 4px; padding: 14px 16px; max-width: 86%; font-size: 15px; line-height: 1.6; }
.confirm-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #b45309; margin-bottom: 6px; }
.confirm-desc { color: #92400e; margin-bottom: 12px; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btn { flex: 1; padding: 10px 14px; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; }
.confirm-btn.yes { background: #1c1c1a; color: white; }
.confirm-btn.no { background: white; color: var(--text2); border-color: var(--border2); }
.fade-in { animation: fadeIn 0.18s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.send-btn { border-radius: 50%; background: var(--send-bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.12s, opacity 0.15s; }
.send-btn:active { transform: scale(0.9); }
.send-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

/* file input hidden */
input[type=file] { display: none; }

/* DESKTOP */
@media (min-width: 768px) {
  #mobile-view { display: none !important; }
  #desktop-view { display: flex; flex-direction: column; height: 100%; }
  #d-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 20px; padding: 0 24px; }
  #d-welcome img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; }
  #d-searchbar { width: 100%; max-width: 580px; display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--border); border-radius: 28px; padding: 10px 12px 10px 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); transition: box-shadow 0.2s; }
  #d-searchbar:focus-within { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  #d-searchbar textarea { flex: 1; font-size: 16px; min-height: 26px; max-height: 120px; line-height: 1.5; padding: 0; font-family: inherit; color: var(--text); background: transparent; border: none; outline: none; resize: none; }
  #d-searchbar textarea::placeholder { color: var(--text3); }
  #d-searchbar .send-btn { width: 38px; height: 38px; } #d-searchbar .send-btn svg { width: 15px; height: 15px; }
  #d-chat { display: none; flex-direction: column; flex: 1; max-width: 720px; width: 100%; margin: 0 auto; min-height: 0; }
  #d-chat-header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #d-chat-header img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
  #d-chat-header span { font-size: 15px; font-weight: 600; }
  #d-chat-header button { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text3); padding: 6px 10px; border-radius: 8px; font-family: inherit; }
  #d-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; scrollbar-width: thin; min-height: 0; }
  #d-inputarea { padding: 8px 20px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
  #d-inputbar { display: flex; align-items: flex-end; gap: 8px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 26px; padding: 8px 10px 8px 14px; }
  #d-inputbar:focus-within { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
  #d-inputbar textarea { flex: 1; min-height: 26px; max-height: 120px; line-height: 1.5; padding: 0; font-family: inherit; font-size: 15px; color: var(--text); background: transparent; border: none; outline: none; resize: none; }
  #d-inputbar textarea::placeholder { color: var(--text3); }
  #d-inputbar .send-btn { width: 38px; height: 38px; } #d-inputbar .send-btn svg { width: 15px; height: 15px; }
  #d-attach-area { padding: 4px 4px 0 4px; }
}

/* MOBILE */
@media (max-width: 767px) {
  #desktop-view { display: none !important; }
  #mobile-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #m-header { display: none; align-items: center; padding: 12px 18px; padding-top: calc(env(safe-area-inset-top, 0px) + 12px); border-bottom: 1px solid var(--border); gap: 12px; background: #fff; flex-shrink: 0; }
  #m-header img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
  #m-header .hname { font-size: 17px; font-weight: 600; }
  #m-header .hclear { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text3); padding: 6px 10px; border-radius: 8px; font-family: inherit; }
  #m-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; padding: 24px; text-align: center; }
  #m-welcome img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; }
  #m-welcome h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  #m-messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding: 16px 16px 8px; display: none; flex-direction: column; gap: 4px; }
  #m-inputwrap { flex-shrink: 0; padding: 8px 16px; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px); background: #fff; border-top: 1px solid var(--border); }
  #m-inputbar { display: flex; align-items: flex-end; gap: 8px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 28px; padding: 8px 10px 8px 14px; }
  #m-inputbar:focus-within { border-color: var(--border2); }
  #m-inputbar textarea { flex: 1; min-height: 28px; max-height: 110px; line-height: 1.55; padding: 2px 0; font-family: inherit; font-size: 17px; color: var(--text); background: transparent; border: none; outline: none; resize: none; }
  #m-inputbar textarea::placeholder { color: var(--text3); }
  #m-inputbar .send-btn { width: 40px; height: 40px; } #m-inputbar .send-btn svg { width: 16px; height: 16px; }
  #m-attach-area { padding: 4px 4px 0 4px; }
}
</style>
</head>
<body>

<!-- hidden file input -->
<input type="file" id="file-input" accept="image/*,.pdf">

<!-- Drive picker modal -->
<div class="drive-modal-overlay" id="drive-modal">
  <div class="drive-modal">
    <button class="drive-modal-close" onclick="closeDrivePicker()">✕ Close</button>
    <h3>📂 Pick a file from Google Drive</h3>
    <div class="drive-search-row">
      <input type="text" id="drive-search-input" placeholder="Search Drive…" onkeydown="driveSearchKey(event)">
      <button onclick="runDriveSearch()">Search</button>
    </div>
    <div class="drive-results" id="drive-results">
      <div class="drive-empty">Type a search term above</div>
    </div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop-view">
  <div id="d-welcome">
    <img id="d-wlogo" alt="Edith">
    <div>
      <div id="d-attach-area" class="attach-area"></div>
      <div id="d-searchbar">
        <textarea id="d-input" placeholder="Ask Edith anything…" rows="1" onkeydown="dOnKey(event)" oninput="grow(this)"></textarea>
        <button class="icon-btn" id="d-attach-btn" title="Attach file or photo" onclick="triggerFileInput('d')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="icon-btn" title="Pick from Google Drive" onclick="openDrivePicker('d')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        </button>
        <button class="send-btn" id="d-send" onclick="dSend()"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5l-1.4 1.4 5.2 5.2H4v2h11.8l-5.2 5.2L12 20.4l9-9-9-9z" fill="white"/></svg></button>
      </div>
    </div>
  </div>
  <div id="d-chat">
    <div id="d-chat-header">
      <img id="d-hlogo" alt="Edith"><span>Edith</span>
      <button onclick="dClear()">Clear</button>
    </div>
    <div id="d-messages"></div>
    <div id="d-inputarea">
      <div id="d-attach-area2" class="attach-area"></div>
      <div id="d-inputbar">
        <textarea id="d-cinput" placeholder="Ask Edith anything…" rows="1" onkeydown="dChatOnKey(event)" oninput="grow(this)"></textarea>
        <button class="icon-btn" title="Attach file or photo" onclick="triggerFileInput('d')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="icon-btn" title="Pick from Google Drive" onclick="openDrivePicker('d')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        </button>
        <button class="send-btn" id="d-csend" onclick="dChatSend()"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5l-1.4 1.4 5.2 5.2H4v2h11.8l-5.2 5.2L12 20.4l9-9-9-9z" fill="white"/></svg></button>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE -->
<div id="mobile-view">
  <div id="m-header">
    <img id="m-hlogo" alt="Edith">
    <span class="hname">Edith</span>
    <button class="hclear" onclick="mClear()">Clear</button>
  </div>
  <div id="m-welcome">
    <img id="m-wlogo" alt="Edith">
    <h1>Hi, I'm Edith</h1>
  </div>
  <div id="m-messages"></div>
  <div id="m-inputwrap">
    <div id="m-attach-area" class="attach-area"></div>
    <div id="m-inputbar">
      <button class="icon-btn" title="Attach file or photo" onclick="triggerFileInput('m')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button class="icon-btn" title="Pick from Google Drive" onclick="openDrivePicker('m')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      </button>
      <textarea id="m-input" placeholder="Ask Edith anything…" rows="1" onkeydown="mOnKey(event)" oninput="grow(this)"></textarea>
      <button class="send-btn" id="m-send" onclick="mSend()"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5l-1.4 1.4 5.2 5.2H4v2h11.8l-5.2 5.2L12 20.4l9-9-9-9z" fill="white"/></svg></button>
    </div>
  </div>
</div>

<script>
var BACKEND = 'https://lucky-dawn-cb08.andy-c1d.workers.dev';

// Load the Edith logo from GitHub (avoids re-embedding the large base64 string)
var LOGO_URL = 'https://shortydont.github.io/edith/icon-192x192.png';
['d-wlogo','d-hlogo','m-hlogo','m-wlogo'].forEach(function(id){var el=document.getElementById(id);if(el)el.src=LOGO_URL;});

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js');
  });
}

var WRITE_TOOLS={
  gmail_move:function(i){return 'Move emails matching "'+i.query+'" to label "'+i.label_name+'"';},
  gmail_label:function(i){return 'Apply label "'+i.label_name+'" to emails matching "'+i.query+'"';},
  gmail_trash:function(i){return 'Trash emails matching "'+i.query+'"';},
  gmail_mark_read:function(i){return 'Mark emails matching "'+i.query+'" as read';},
  gmail_draft:function(i){return 'Create a draft to '+i.to+' — subject: "'+i.subject+'"';},
  cal_create_event:function(i){return 'Create event "'+i.title+'" on '+i.start;},
  cal_delete_event:function(i){return 'Delete calendar event (ID: '+i.event_id+')';},
  tasks_create:function(i){return 'Create task: "'+i.title+'"';},
  tasks_complete:function(i){return 'Mark task complete (ID: '+i.task_id+')';},
  tasks_delete:function(i){return 'Delete task (ID: '+i.task_id+')';}
};

var msgHistory=[],busy=false,dStarted=false,mStarted=false,pending=null;

// ── attachment state ──────────────────────────────────────────────────────────
// pendingAttachment: null | { name, mediaType, base64Data } for device uploads
// pendingDriveRef:   null | { fileId, fileName, instruction } for Drive refs
var pendingAttachment = null;
var pendingDriveRef = null;
var drivePickerCaller = null; // 'd' or 'm'

function callBackend(action, params, onSuccess, onError) {
  fetch(BACKEND + '?action=' + action, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(params)
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data && data.result !== undefined) {
      if (onSuccess) onSuccess(data.result);
    } else if (data && data.error) {
      if (onError) onError(data.error);
    } else {
      if (onSuccess) onSuccess(data);
    }
  })
  .catch(function(err){ if(onError) onError(err.message||'Network error'); });
}

callBackend('loadHistory', {}, function(s){ if(s&&s.length) msgHistory=s; });

function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function dScroll(){var m=document.getElementById('d-messages');requestAnimationFrame(function(){m.scrollTop=m.scrollHeight;});}
function mScroll(){var m=document.getElementById('m-messages');requestAnimationFrame(function(){m.scrollTop=m.scrollHeight;});}
function scroll(p){p==='d'?dScroll():mScroll();}

function dOnKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();dSend();}}
function dChatOnKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();dChatSend();}}
function dSend(){var i=document.getElementById('d-input');var t=i.value.trim();if(!t&&!pendingAttachment&&!pendingDriveRef)return;i.value='';i.style.height='auto';dStart();send(t,'d');}
function dChatSend(){var i=document.getElementById('d-cinput');var t=i.value.trim();if(!t&&!pendingAttachment&&!pendingDriveRef)return;i.value='';i.style.height='auto';send(t,'d');}
function dStart(){if(dStarted)return;dStarted=true;document.getElementById('d-welcome').style.display='none';document.getElementById('d-chat').style.display='flex';}
function dBubble(role,text,cls){
  var m=document.getElementById('d-messages');
  var g=document.createElement('div');g.className='msg-group '+role+' fade-in';
  var b=document.createElement('div');b.className='bubble'+(cls?' '+cls:'');
  if(cls==='typing'){b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';}else{b.textContent=text;}
  var ts=document.createElement('div');ts.className='msg-time';ts.textContent=now();
  g.appendChild(b);g.appendChild(ts);m.appendChild(g);dScroll();return b;
}
function dClear(){callBackend('clearHistory',{},function(){msgHistory=[];dStarted=false;document.getElementById('d-messages').innerHTML='';document.getElementById('d-chat').style.display='none';document.getElementById('d-welcome').style.display='flex';clearAttachment();});}

function mOnKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();mSend();}}
function mSend(){var i=document.getElementById('m-input');var t=i.value.trim();if(!t&&!pendingAttachment&&!pendingDriveRef)return;i.value='';i.style.height='auto';mStart();send(t,'m');}
function mStart(){if(mStarted)return;mStarted=true;document.getElementById('m-welcome').style.display='none';document.getElementById('m-header').style.display='flex';document.getElementById('m-messages').style.display='flex';}
function mBubble(role,text,cls){
  var m=document.getElementById('m-messages');
  var g=document.createElement('div');g.className='msg-group '+role+' fade-in';
  var b=document.createElement('div');b.className='bubble'+(cls?' '+cls:'');
  if(cls==='typing'){b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';}else{b.textContent=text;}
  var ts=document.createElement('div');ts.className='msg-time';ts.textContent=now();
  g.appendChild(b);g.appendChild(ts);m.appendChild(g);mScroll();return b;
}
function mClear(){callBackend('clearHistory',{},function(){msgHistory=[];mStarted=false;document.getElementById('m-messages').innerHTML='';document.getElementById('m-messages').style.display='none';document.getElementById('m-header').style.display='none';document.getElementById('m-welcome').style.display='flex';clearAttachment();});}

function bubble(role,text,cls,p){return p==='d'?dBubble(role,text,cls):mBubble(role,text,cls);}
function setBusy(v,p){busy=v;var b=document.getElementById(p==='d'?'d-csend':'m-send');if(b)b.disabled=v;}

function confirmCard(desc,onYes,onNo,p){
  var m=document.getElementById(p==='d'?'d-messages':'m-messages');
  var g=document.createElement('div');g.className='msg-group assistant fade-in';
  var c=document.createElement('div');c.className='confirm-card';
  var y='cy'+Date.now();var n='cn'+Date.now();
  c.innerHTML='<div class="confirm-label">⚠ Confirm action</div><div class="confirm-desc">'+desc+'</div><div class="confirm-btns"><button class="confirm-btn yes" id="'+y+'">Yes, do it</button><button class="confirm-btn no" id="'+n+'">Cancel</button></div>';
  var ts=document.createElement('div');ts.className='msg-time';ts.textContent=now();
  g.appendChild(c);g.appendChild(ts);m.appendChild(g);scroll(p);
  document.getElementById(y).onclick=function(){c.querySelector('.confirm-btns').innerHTML='<span style="font-size:13px;color:#6b6b62">✓ Confirmed</span>';onYes();};
  document.getElementById(n).onclick=function(){c.querySelector('.confirm-btns').innerHTML='<span style="font-size:13px;color:#6b6b62">✗ Cancelled</span>';onNo();};
}

// ── Attachment helpers ────────────────────────────────────────────────────────

function getAttachArea(p) {
  // returns the visible attach area for the given panel
  if (p === 'd') {
    return dStarted
      ? document.getElementById('d-attach-area2')
      : document.getElementById('d-attach-area');
  }
  return document.getElementById('m-attach-area');
}

function renderAttachBadge(name, p) {
  var area = getAttachArea(p);
  area.innerHTML = '';
  area.classList.add('visible');
  var badge = document.createElement('div');
  badge.className = 'attach-badge';
  var icon = name.toLowerCase().endsWith('.pdf')
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
  badge.innerHTML = icon + '<span>' + name + '</span><span class="rm" onclick="clearAttachment()">×</span>';
  area.appendChild(badge);
}

function clearAttachment() {
  pendingAttachment = null;
  pendingDriveRef = null;
  document.getElementById('file-input').value = '';
  ['d-attach-area','d-attach-area2','m-attach-area'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.innerHTML = ''; el.classList.remove('visible'); }
  });
}

function triggerFileInput(p) {
  drivePickerCaller = p;
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var p = drivePickerCaller || 'm';

  // Determine media type
  var mediaType = file.type;
  if (!mediaType || mediaType === '') {
    // try to guess from extension
    if (file.name.toLowerCase().endsWith('.pdf')) mediaType = 'application/pdf';
    else mediaType = 'image/jpeg';
  }

  // Only support images and PDFs
  if (!mediaType.startsWith('image/') && mediaType !== 'application/pdf') {
    alert('Only images and PDF files are supported. For other file types, ask Edith to read them from Google Drive.');
    return;
  }

  var reader = new FileReader();
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    var base64 = dataUrl.split(',')[1];
    pendingAttachment = { name: file.name, mediaType: mediaType, base64Data: base64 };
    pendingDriveRef = null;
    renderAttachBadge(file.name, p);
  };
  reader.readAsDataURL(file);
});

// ── Drive picker ──────────────────────────────────────────────────────────────

function openDrivePicker(p) {
  drivePickerCaller = p;
  document.getElementById('drive-modal').classList.add('open');
  document.getElementById('drive-results').innerHTML = '<div class="drive-empty">Type a search term above</div>';
  document.getElementById('drive-search-input').value = '';
  setTimeout(function(){ document.getElementById('drive-search-input').focus(); }, 100);
}

function closeDrivePicker() {
  document.getElementById('drive-modal').classList.remove('open');
}

function driveSearchKey(e) {
  if (e.key === 'Enter') runDriveSearch();
}

function runDriveSearch() {
  var q = document.getElementById('drive-search-input').value.trim();
  if (!q) return;
  var resultsEl = document.getElementById('drive-results');
  resultsEl.innerHTML = '<div class="drive-empty">Searching…</div>';

  callBackend('chat', {
    message: 'Search Google Drive for files matching "' + q + '". Return ONLY a JSON array of objects with fields: id, name, type. No explanation, just the raw JSON array. Maximum 10 results.',
    history: [],
    writableTools: []
  }, function(r) {
    if (!r || !r.reply) { resultsEl.innerHTML = '<div class="drive-empty">No results</div>'; return; }
    var items;
    try {
      // Claude may wrap it in markdown code block — strip that
      var raw = r.reply.replace(/```json\n?/g,'').replace(/```/g,'').trim();
      items = JSON.parse(raw);
    } catch(ex) {
      // If parsing fails, show the raw response as a note
      resultsEl.innerHTML = '<div class="drive-empty">Could not parse results. Try a more specific search.</div>';
      return;
    }
    if (!Array.isArray(items) || items.length === 0) {
      resultsEl.innerHTML = '<div class="drive-empty">No files found</div>';
      return;
    }
    resultsEl.innerHTML = '';
    items.forEach(function(f) {
      var div = document.createElement('div');
      div.className = 'drive-item';
      var shortType = (f.type||'').replace('application/vnd.google-apps.','').replace('application/','');
      div.innerHTML = '<span class="di-name">📄 ' + (f.name||'Untitled') + '</span><span class="di-type">' + shortType + '</span>';
      div.onclick = function() {
        selectDriveFile(f.id, f.name);
      };
      resultsEl.appendChild(div);
    });
  }, function(err) {
    resultsEl.innerHTML = '<div class="drive-empty">Error: ' + err + '</div>';
  });
}

function selectDriveFile(fileId, fileName) {
  var p = drivePickerCaller || 'm';
  pendingDriveRef = { fileId: fileId, fileName: fileName };
  pendingAttachment = null;
  renderAttachBadge('📂 ' + fileName, p);
  closeDrivePicker();
}

// ── Main send ─────────────────────────────────────────────────────────────────

function send(text, p) {
  if (busy) return;

  // Build the message text, optionally appending Drive file instruction
  var messageText = text;
  var attachment = pendingAttachment ? {
    name: pendingAttachment.name,
    mediaType: pendingAttachment.mediaType,
    base64Data: pendingAttachment.base64Data
  } : null;

  if (pendingDriveRef) {
    // Append a natural instruction so Claude reads the Drive file
    var driveInstruction = text
      ? text + '\n\n[Please read the file "' + pendingDriveRef.fileName + '" (Drive ID: ' + pendingDriveRef.fileId + ') and use its contents to answer.]'
      : 'Please read the file "' + pendingDriveRef.fileName + '" from Google Drive (ID: ' + pendingDriveRef.fileId + ') and summarise or describe its contents.';
    messageText = driveInstruction;
  }

  // Build display text for the chat bubble
  var displayText = text || '';
  if (pendingAttachment) displayText = (displayText ? displayText + '\n' : '') + '📎 ' + pendingAttachment.name;
  if (pendingDriveRef)   displayText = (displayText ? displayText + '\n' : '') + '📂 ' + pendingDriveRef.fileName;

  msgHistory.push({role:'user',content:displayText||messageText});
  bubble('user', displayText||messageText, null, p);
  clearAttachment();
  setBusy(true, p);
  var typing = bubble('assistant','','typing',p);

  var params = {
    message: messageText,
    history: msgHistory,
    writableTools: Object.keys(WRITE_TOOLS)
  };
  if (attachment) {
    params.attachment = attachment;
  }

  callBackend('chat', params,
    function(r){
      if(!r){typing.className='bubble error';typing.textContent='No response.';setBusy(false,p);return;}
      if(r.needsConfirmation){
        typing.parentElement.remove();
        var desc=WRITE_TOOLS[r.toolName]?WRITE_TOOLS[r.toolName](r.toolInput):'Run: '+r.toolName;
        pending=r.pendingToolCall;
        if(r.history&&r.history.length)msgHistory=r.history;
        confirmCard(desc,
          function(){
            setBusy(true,p);var t2=bubble('assistant','','typing',p);
            callBackend('confirmAndExecute',{pendingToolCall:pending,history:msgHistory},
              function(r2){t2.className='bubble';t2.textContent=(r2&&r2.reply)?r2.reply:'Done!';if(r2&&r2.reply)msgHistory.push({role:'assistant',content:r2.reply});setBusy(false,p);scroll(p);},
              function(e){t2.className='bubble error';t2.textContent='Error: '+e;setBusy(false,p);}
            );
          },
          function(){bubble('assistant','No problem, action cancelled.',null,p);setBusy(false,p);},
          p
        );
      } else {
        typing.className='bubble';typing.textContent=r.reply||'Done!';
        if(r.reply)msgHistory.push({role:'assistant',content:r.reply});
        setBusy(false,p);scroll(p);
      }
    },
    function(err){typing.className='bubble error';typing.textContent='Error: '+err;setBusy(false,p);}
  );
}
</script>
