<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Edith">
<meta name="theme-color" content="#ffffff">
<title>Edith</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192x192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512x512.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #ffffff;
  --text: #1a1a19;
  --text2: #6b6b62;
  --text3: #b0b0a8;
  --border: #ebebE7;
  --border2: #d5d5cf;
  --user-bg: #f2f2ef;
  --input-bg: #f7f7f5;
  --send-bg: #1a1a19;
  --accent: #d97706;
}
html { height: 100%; }
body { height: 100%; margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); background: var(--bg); overflow: hidden; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

/* ── Messages ── */
.msg-group { display: flex; flex-direction: column; margin-bottom: 20px; }
.msg-group.user { align-items: flex-end; }
.msg-group.assistant { align-items: flex-start; }

/* User bubble — pill style */
.msg-group.user .bubble {
  background: var(--user-bg);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 20px;
  border-bottom-right-radius: 5px;
  max-width: 76%;
  font-size: 15px;
  line-height: 1.6;
  word-break: break-word;
}

/* Assistant — no bubble, just text */
.msg-group.assistant .bubble {
  background: transparent;
  color: var(--text);
  padding: 0;
  max-width: 100%;
  font-size: 15.5px;
  line-height: 1.75;
  word-break: break-word;
  font-family: Georgia, 'Times New Roman', serif;
}

/* Markdown inside assistant bubbles */
.msg-group.assistant .bubble p { margin: 0 0 10px; }
.msg-group.assistant .bubble p:last-child { margin-bottom: 0; }
.msg-group.assistant .bubble ul,
.msg-group.assistant .bubble ol { padding-left: 22px; margin: 6px 0 10px; }
.msg-group.assistant .bubble li { margin-bottom: 4px; line-height: 1.65; }
.msg-group.assistant .bubble strong { font-weight: 700; }
.msg-group.assistant .bubble em { font-style: italic; }
.msg-group.assistant .bubble h1,
.msg-group.assistant .bubble h2,
.msg-group.assistant .bubble h3 { font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.01em; margin: 16px 0 6px; line-height: 1.3; }
.msg-group.assistant .bubble h1 { font-size: 17px; }
.msg-group.assistant .bubble h2 { font-size: 16px; }
.msg-group.assistant .bubble h3 { font-size: 15px; }
.msg-group.assistant .bubble code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; background: #f0f0ec; border-radius: 4px; padding: 1px 5px; color: #c2410c; }
.msg-group.assistant .bubble pre { background: #f7f7f5; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; overflow-x: auto; margin: 10px 0; }
.msg-group.assistant .bubble pre code { background: none; padding: 0; color: var(--text); }
.msg-group.assistant .bubble blockquote { border-left: 3px solid var(--border2); padding-left: 14px; color: var(--text2); margin: 8px 0; }
.msg-group.assistant .bubble hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* Typing dots */
.bubble.typing { background: transparent; padding: 4px 0; }
.dots { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
.dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bop 1.4s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: 0.18s; }
.dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes bop { 0%,60%,100%{transform:translateY(0);opacity:0.35} 30%{transform:translateY(-5px);opacity:1} }

.bubble.error { font-family: 'Inter', sans-serif; font-size: 14px; color: #b91c1c; background: #fff5f5; border: 1px solid #fecaca; border-radius: 12px; padding: 10px 14px; }

.msg-time { font-size: 11px; color: var(--text3); margin-top: 5px; letter-spacing: 0.01em; }
.msg-group.user .msg-time { text-align: right; }

.tool-indicator { display: flex; align-items: center; gap: 6px; padding: 6px 0 2px; flex-wrap: wrap; }
.tool-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px 3px 6px; font-size: 11.5px; color: var(--text2); font-family: 'Inter', sans-serif; animation: pulse 1.8s ease-in-out infinite; }
.tool-badge svg { flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }

/* ── Confirm card ── */
.confirm-card { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; max-width: 88%; font-family: 'Inter', sans-serif; }
.confirm-label { font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.02em; }
.confirm-desc { font-size: 14px; line-height: 1.6; color: var(--text); margin-bottom: 14px; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btn { flex: 1; padding: 9px 14px; border-radius: 10px; font-family: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: opacity 0.15s; }
.confirm-btn.yes { background: var(--send-bg); color: #fff; }
.confirm-btn.no { background: var(--input-bg); color: var(--text2); border-color: var(--border); }
.confirm-btn:hover { opacity: 0.8; }

/* ── Attachment badge ── */
.attach-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--input-bg); border: 1px solid var(--border2);
  border-radius: 10px; padding: 5px 11px; font-size: 13px;
  color: var(--text2); margin-bottom: 6px; max-width: 240px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.attach-badge svg { flex-shrink: 0; }
.attach-badge .rm { cursor: pointer; margin-left: 4px; color: var(--text3); font-size: 16px; line-height: 1; }
.attach-badge .rm:hover { color: var(--text); }
.attach-area { display: none; padding: 6px 6px 0; }
.attach-area.visible { display: block; }

/* ── Drive modal ── */
.drive-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: flex-end; justify-content: center; }
.drive-modal-overlay.open { display: flex; }
.drive-modal { background: #fff; border-radius: 22px 22px 0 0; width: 100%; max-width: 580px; padding: 20px 20px 36px; max-height: 72vh; display: flex; flex-direction: column; box-shadow: 0 -8px 40px rgba(0,0,0,0.1); }
.drive-modal h3 { font-size: 14.5px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.01em; }
.drive-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
.drive-search-row input { flex: 1; font-family: inherit; font-size: 15px; padding: 9px 14px; border: 1px solid var(--border); border-radius: 12px; outline: none; background: var(--input-bg); color: var(--text); }
.drive-search-row input:focus { border-color: var(--border2); background: #fff; }
.drive-search-row button { background: var(--send-bg); color: #fff; border: none; border-radius: 12px; padding: 0 18px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
.drive-results { overflow-y: auto; flex: 1; }
.drive-item { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text); }
.drive-item:hover { background: var(--input-bg); }
.drive-item .di-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.drive-item .di-type { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.drive-modal-close { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text3); padding: 4px 8px; border-radius: 8px; font-family: inherit; margin-bottom: 6px; align-self: flex-end; }
.drive-modal-close:hover { color: var(--text); }
.drive-empty { color: var(--text3); font-size: 14px; text-align: center; padding: 28px 0; }

/* ── Buttons ── */
.icon-btn { background: none; border: none; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; font-size: 17px; line-height: 1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.12s; padding: 0; color: var(--text3); }
.icon-btn:hover { background: rgba(0,0,0,0.05); color: var(--text2); }
.icon-btn:active { background: rgba(0,0,0,0.09); }
.send-btn { border-radius: 50%; background: var(--send-bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.1s, opacity 0.15s; }
.send-btn:active { transform: scale(0.88); }
.send-btn:disabled { opacity: 0.18; cursor: not-allowed; transform: none; }

input[type=file] { display: none; }

/* ── DESKTOP ── */
@media (min-width: 768px) {
  #mobile-view { display: none !important; }
  #desktop-view { display: flex; flex-direction: column; height: 100%; }

  /* Welcome — centred search */
  #d-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 28px; padding: 0 24px; }
  #d-welcome img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; }
  #d-welcome-name { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  #d-welcome-sub { font-size: 14px; color: var(--text3); margin-top: -16px; }

  #d-searchbar {
    width: 100%; max-width: 600px;
    display: flex; align-items: center; gap: 6px;
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 0 8px 0 16px; height: 46px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #d-searchbar:focus-within { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
  #d-searchbar textarea { flex: 1; font-size: 15px; height: 22px; max-height: 120px; line-height: 22px; padding: 0; margin: 0; font-family: inherit; color: var(--text); background: transparent; border: none; outline: none; resize: none; overflow: hidden; display: block; vertical-align: middle; }
  #d-searchbar textarea::placeholder { color: var(--text3); }
  #d-searchbar .send-btn { width: 36px; height: 36px; flex-shrink: 0; }
  #d-searchbar .send-btn svg { width: 14px; height: 14px; }

  /* Chat view */
  #d-chat { display: none; flex-direction: column; flex: 1; width: 100%; max-width: 720px; margin: 0 auto; min-height: 0; }
  #d-chat-header { display: flex; align-items: center; gap: 10px; padding: 14px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #d-chat-header img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
  #d-chat-header span { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  #d-chat-header button { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text3); padding: 5px 10px; border-radius: 8px; font-family: inherit; transition: color 0.12s; }
  #d-chat-header button:hover { color: var(--text2); }

  #d-messages { flex: 1; overflow-y: auto; padding: 28px 24px 16px; display: flex; flex-direction: column; scrollbar-width: thin; min-height: 0; }

  #d-inputarea { padding: 8px 24px 24px; border-top: 1px solid var(--border); flex-shrink: 0; }
  #d-inputbar { display: flex; align-items: flex-end; gap: 6px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 18px; padding: 10px 10px 10px 18px; transition: border-color 0.15s, box-shadow 0.15s; }
  #d-inputbar:focus-within { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
  #d-inputbar textarea { flex: 1; min-height: 24px; max-height: 120px; line-height: 1.55; padding: 0; font-family: inherit; font-size: 15px; color: var(--text); background: transparent; border: none; outline: none; resize: none; overflow: hidden; }
  #d-inputbar textarea::placeholder { color: var(--text3); }
  #d-inputbar .send-btn { width: 36px; height: 36px; flex-shrink: 0; }
  #d-inputbar .send-btn svg { width: 14px; height: 14px; }
  #d-attach-area, #d-attach-area2 { padding: 4px 4px 0; }
}

/* ── MOBILE ── */
@media (max-width: 767px) {
  #desktop-view { display: none !important; }
  #mobile-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; background: var(--bg); }

  #m-header { display: none; align-items: center; padding: 12px 18px; padding-top: calc(env(safe-area-inset-top, 0px) + 12px); border-bottom: 1px solid var(--border); gap: 10px; background: var(--bg); flex-shrink: 0; }
  #m-header img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
  #m-header .hname { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  #m-header .hclear { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text3); padding: 6px 10px; border-radius: 8px; font-family: inherit; }

  #m-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 14px; padding: 32px 24px; text-align: center; }
  #m-welcome img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; }
  #m-welcome h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.025em; color: var(--text); }
  #m-welcome p { font-size: 15px; color: var(--text3); margin-top: -4px; }

  #m-messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding: 20px 18px 10px; display: none; flex-direction: column; }

  #m-inputwrap { flex-shrink: 0; padding: 8px 14px; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px); background: var(--bg); border-top: 1px solid var(--border); }
  #m-inputbar { display: flex; align-items: flex-end; gap: 6px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 22px; padding: 8px 8px 8px 16px; transition: border-color 0.15s; }
  #m-inputbar:focus-within { border-color: var(--border2); }
  #m-inputbar textarea { flex: 1; min-height: 26px; max-height: 110px; line-height: 1.55; padding: 2px 0; font-family: inherit; font-size: 16px; color: var(--text); background: transparent; border: none; outline: none; resize: none; }
  #m-inputbar textarea::placeholder { color: var(--text3); }
  #m-inputbar .send-btn { width: 38px; height: 38px; flex-shrink: 0; }
  #m-inputbar .send-btn svg { width: 14px; height: 14px; }
  #m-attach-area { padding: 4px 4px 0; }
}
</style>
</head>
<body>

<input type="file" id="file-input" accept="image/*,.pdf">

<div class="drive-modal-overlay" id="drive-modal">
  <div class="drive-modal">
    <button class="drive-modal-close" onclick="closeDrivePicker()">✕ Close</button>
    <h3><svg width="16" height="14" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg" style="vertical-align:-2px;margin-right:6px"><path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#4285f4"/><path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#34a853"/><path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.5l5.85 11.5z" fill="#ea4335"/><path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/><path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/><path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg>Google Drive</h3>
    <div class="drive-search-row">
      <input type="text" id="drive-search-input" placeholder="Search Drive…" onkeydown="driveSearchKey(event)">
      <button onclick="runDriveSearch()">Search</button>
    </div>
    <div class="drive-results" id="drive-results">
      <div class="drive-empty">Type a search term above</div>
    </div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop-view">
  <div id="d-welcome">
    <img id="d-wlogo" alt="Edith">
    <div id="d-welcome-name">Edith</div>
    <div id="d-welcome-sub">Your personal AI assistant</div>
    <div>
      <div id="d-attach-area" class="attach-area"></div>
      <div id="d-searchbar">
        <textarea id="d-input" placeholder="Ask Edith anything…" rows="1" onkeydown="dOnKey(event)" oninput="grow(this)" autofocus></textarea>
        <button class="icon-btn" title="Attach file or photo" onclick="triggerFileInput('d')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
        <button class="icon-btn" title="Pick from Google Drive" onclick="openDrivePicker('d')"><svg width="18" height="16" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg"><path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#4285f4"/><path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#34a853"/><path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.5l5.85 11.5z" fill="#ea4335"/><path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/><path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/><path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg></button>
        <button class="send-btn" id="d-send" onclick="dSend()"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5l-1.4 1.4 5.2 5.2H4v2h11.8l-5.2 5.2L12 20.4l9-9-9-9z" fill="white"/></svg></button>
      </div>
    </div>
  </div>
  <div id="d-chat">
    <div id="d-chat-header">
      <img id="d-hlogo" alt="Edith"><span>Edith</span>
      <button onclick="dClear()">Clear</button>
    </div>
    <div id="d-messages"></div>
    <div id="d-inputarea">
      <div id="d-attach-area2" class="attach-area"></div>
      <div id="d-inputbar">
        <textarea id="d-cinput" placeholder="Ask Edith anything…" rows="1" onkeydown="dChatOnKey(event)" oninput="grow(this)"></textarea>
        <button class="icon-btn" title="Attach file or photo" onclick="triggerFileInput('d')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>

var msgHistory = [], busy = false, dStarted = false, mStarted = false, pending = null;

// ── Non-streaming backend call (confirmAndExecute, loadHistory, clearHistory) ─

function callBackend(action, params, onSuccess, onError) {
  var body = Object.assign({}, params);
  fetch(BACKEND + '?action=' + action, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.result !== undefined) { if (onSuccess) onSuccess(data.result); }
    else if (data && data.error)           { if (onError) onError(data.error); }
    else                                   { if (onSuccess) onSuccess(data); }
  })
  .catch(function(err) { if (onError) onError(err.message || 'Network error'); });
}

callBackend('loadHistory', {}, function(s) { if (s && s.length) msgHistory = s; });

// ── SSE streaming chat ────────────────────────────────────────────────────────

function streamChat(params, typing, p) {
  var body = Object.assign({}, params);
  var replyText = '';
  var toolIndicator = null;
  var shownServices = {};

  fetch(BACKEND + '?action=chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(response) {
    if (!response.ok) {
      response.json().catch(function(){ return {}; }).then(function(err) {
        typing.className = 'bubble error';
        typing.textContent = 'Error: ' + (err.error || response.status);
        setBusy(false, p);
      });
      return;
    }

    var reader  = response.body.getReader();
    var decoder = new TextDecoder();
    var buffer  = '';

    function read() {
      reader.read().then(function(result) {
        if (result.done) { setBusy(false, p); return; }

        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (!line.startsWith('data: ')) continue;
          var raw = line.slice(6).trim();
          if (!raw) continue;
          var event;
          try { event = JSON.parse(raw); } catch(e) { continue; }

          if (event.type === 'token') {
            if (toolIndicator) { toolIndicator.remove(); toolIndicator = null; shownServices = {}; }
            replyText += event.text;
            typing.className = 'bubble';
            typing.innerHTML = marked.parse(replyText);
            scroll(p);

          } else if (event.type === 'tool_start') {
            var svc = event.service || 'unknown';
            if (!shownServices[svc]) {
              shownServices[svc] = true;
              var logo = getServiceLogo(svc);
              if (logo) {
                if (!toolIndicator) {
                  toolIndicator = document.createElement('div');
                  toolIndicator.className = 'tool-indicator';
                  typing.parentNode.insertBefore(toolIndicator, typing.nextSibling);
                }
                var badge = document.createElement('div');
                badge.className = 'tool-badge';
                badge.innerHTML = logo.svg + '<span>' + logo.label + '</span>';
                toolIndicator.appendChild(badge);
              }
            }

          } else if (event.type === 'confirmation_needed') {
            typing.parentElement.remove();
            var desc = WRITE_TOOLS[event.toolName] ? WRITE_TOOLS[event.toolName](event.toolInput) : 'Run: ' + event.toolName;
            pending = event.pendingToolCall;
            if (event.history && event.history.length) msgHistory = event.history;
            confirmCard(desc,
              function() {
                setBusy(true, p); var t2 = bubble('assistant', '', 'typing', p);
                callBackend('confirmAndExecute', { pendingToolCall: pending, history: msgHistory },
                  function(r2) { t2.className = 'bubble'; t2.textContent = (r2 && r2.reply) ? r2.reply : 'Done!'; if (r2 && r2.reply) msgHistory.push({ role: 'assistant', content: r2.reply }); setBusy(false, p); scroll(p); },
                  function(e)  { t2.className = 'bubble error'; t2.textContent = 'Error: ' + e; setBusy(false, p); }
                );
              },
              function() { bubble('assistant', 'No problem, action cancelled.', null, p); setBusy(false, p); },
              p
            );
            return;

          } else if (event.type === 'done') {
            if (toolIndicator) { toolIndicator.remove(); toolIndicator = null; }
            if (event.history && event.history.length) msgHistory = event.history;
            if (!replyText) { typing.className = 'bubble'; typing.innerHTML = 'Done.'; }
            setBusy(false, p); scroll(p);
            return;

          } else if (event.type === 'error') {
            if (toolIndicator) { toolIndicator.remove(); toolIndicator = null; }
            typing.className = 'bubble error';
            typing.textContent = 'Error: ' + event.message;
            setBusy(false, p);
            return;
          }
        }
        read();
      }).catch(function(err) {
        typing.className = 'bubble error';
        typing.textContent = 'Error: ' + err.message;
        setBusy(false, p);
      });
    }
    read();
  }).catch(function(err) {
    typing.className = 'bubble error';
    typing.textContent = 'Error: ' + err.message;
    setBusy(false, p);
  });
}

// ── UI helpers ────────────────────────────────────────────────────────────────

function grow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }
function now()    { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function dScroll(){ var m = document.getElementById('d-messages'); requestAnimationFrame(function(){ m.scrollTop = m.scrollHeight; }); }
function mScroll(){ var m = document.getElementById('m-messages'); requestAnimationFrame(function(){ m.scrollTop = m.scrollHeight; }); }
function scroll(p){ p === 'd' ? dScroll() : mScroll(); }

function dOnKey(e)     { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); dSend(); } }
function dChatOnKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); dChatSend(); } }
function dSend()     { var i = document.getElementById('d-input');  var t = i.value.trim(); if (!t && !pendingAttachment && !pendingDriveRef) return; i.value = ''; i.style.height = 'auto'; dStart(); send(t, 'd'); document.getElementById('d-cinput').focus(); }
function dChatSend() { var i = document.getElementById('d-cinput'); var t = i.value.trim(); if (!t && !pendingAttachment && !pendingDriveRef) return; i.value = ''; i.style.height = 'auto'; send(t, 'd'); }
function dStart() { if (dStarted) return; dStarted = true; document.getElementById('d-welcome').style.display = 'none'; document.getElementById('d-chat').style.display = 'flex'; }

function dBubble(role, text, cls) {
  var m = document.getElementById('d-messages');
  var g = document.createElement('div'); g.className = 'msg-group ' + role + ' fade-in';
  var b = document.createElement('div'); b.className = 'bubble' + (cls ? ' ' + cls : '');
  if (cls === 'typing') { b.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>'; } else { b.textContent = text; }
  var ts = document.createElement('div'); ts.className = 'msg-time'; ts.textContent = now();
  g.appendChild(b); g.appendChild(ts); m.appendChild(g); dScroll(); return b;
}
function dClear() {
  callBackend('clearHistory', {}, function() { msgHistory = []; dStarted = false; document.getElementById('d-messages').innerHTML = ''; document.getElementById('d-chat').style.display = 'none'; document.getElementById('d-welcome').style.display = 'flex'; clearAttachment(); });
}

function mOnKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); mSend(); } }
function mSend()   { var i = document.getElementById('m-input'); var t = i.value.trim(); if (!t && !pendingAttachment && !pendingDriveRef) return; i.value = ''; i.style.height = 'auto'; mStart(); send(t, 'm'); }
function mStart()  { if (mStarted) return; mStarted = true; document.getElementById('m-welcome').style.display = 'none'; document.getElementById('m-header').style.display = 'flex'; document.getElementById('m-messages').style.display = 'flex'; }

function mBubble(role, text, cls) {
  var m = document.getElementById('m-messages');
  var g = document.createElement('div'); g.className = 'msg-group ' + role + ' fade-in';
  var b = document.createElement('div'); b.className = 'bubble' + (cls ? ' ' + cls : '');
  if (cls === 'typing') { b.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>'; } else { b.textContent = text; }
  var ts = document.createElement('div'); ts.className = 'msg-time'; ts.textContent = now();
  g.appendChild(b); g.appendChild(ts); m.appendChild(g); mScroll(); return b;
}
function mClear() {
  callBackend('clearHistory', {}, function() { msgHistory = []; mStarted = false; document.getElementById('m-messages').innerHTML = ''; document.getElementById('m-messages').style.display = 'none'; document.getElementById('m-header').style.display = 'none'; document.getElementById('m-welcome').style.display = 'flex'; clearAttachment(); });
}

function bubble(role, text, cls, p) { return p === 'd' ? dBubble(role, text, cls) : mBubble(role, text, cls); }
function setBusy(v, p) { busy = v; var b = document.getElementById(p === 'd' ? 'd-csend' : 'm-send'); if (b) b.disabled = v; }

function confirmCard(desc, onYes, onNo, p) {
  var m = document.getElementById(p === 'd' ? 'd-messages' : 'm-messages');
  var g = document.createElement('div'); g.className = 'msg-group assistant fade-in';
  var c = document.createElement('div'); c.className = 'confirm-card';
  var y = 'cy' + Date.now(); var n = 'cn' + Date.now();
  c.innerHTML = '<div class="confirm-label">Just to confirm</div><div class="confirm-desc">' + desc + '</div><div class="confirm-btns"><button class="confirm-btn yes" id="' + y + '">Yes, go ahead</button><button class="confirm-btn no" id="' + n + '">Cancel</button></div>';
  var ts = document.createElement('div'); ts.className = 'msg-time'; ts.textContent = now();
  g.appendChild(c); g.appendChild(ts); m.appendChild(g); scroll(p);
  document.getElementById(y).onclick = function() { c.querySelector('.confirm-btns').innerHTML = '<span style="font-size:13px;color:#6b6b62">Confirmed</span>'; onYes(); };
  document.getElementById(n).onclick = function() { c.querySelector('.confirm-btns').innerHTML = '<span style="font-size:13px;color:#6b6b62">Cancelled</span>'; onNo(); };
}

// ── Attachment helpers ────────────────────────────────────────────────────────

function getAttachArea(p) {
  if (p === 'd') return dStarted ? document.getElementById('d-attach-area2') : document.getElementById('d-attach-area');
  return document.getElementById('m-attach-area');
}

function renderAttachBadge(name, p) {
  var area = getAttachArea(p);
  area.innerHTML = ''; area.classList.add('visible');
  var badge = document.createElement('div'); badge.className = 'attach-badge';
  var icon = name.toLowerCase().endsWith('.pdf')
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
  badge.innerHTML = icon + '<span>' + name + '</span><span class="rm" onclick="clearAttachment()">x</span>';
  area.appendChild(badge);
}

function clearAttachment() {
  pendingAttachment = null; pendingDriveRef = null;
  document.getElementById('file-input').value = '';
  ['d-attach-area','d-attach-area2','m-attach-area'].forEach(function(id) { var el = document.getElementById(id); if (el) { el.innerHTML = ''; el.classList.remove('visible'); } });
}

function triggerFileInput(p) { drivePickerCaller = p; document.getElementById('file-input').click(); }

document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0]; if (!file) return;
  var p = drivePickerCaller || 'm';
  var mediaType = file.type || (file.name.toLowerCase().endsWith('.pdf') ? 'application/pdf' : 'image/jpeg');
  if (!mediaType.startsWith('image/') && mediaType !== 'application/pdf') { alert('Only images and PDFs supported.'); return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    pendingAttachment = { name: file.name, mediaType: mediaType, base64Data: ev.target.result.split(',')[1] };
    pendingDriveRef = null; renderAttachBadge(file.name, p);
  };
  reader.readAsDataURL(file);
});

// ── Drive picker ──────────────────────────────────────────────────────────────

function openDrivePicker(p) {
  drivePickerCaller = p;
  document.getElementById('drive-modal').classList.add('open');
  document.getElementById('drive-search-input').value = '';
  loadRecentDriveFiles();
  setTimeout(function(){ document.getElementById('drive-search-input').focus(); }, 100);
}

function loadRecentDriveFiles() {
  var resultsEl = document.getElementById('drive-results');
  resultsEl.innerHTML = '<div class="drive-empty">Loading recent files…</div>';
  var body = JSON.stringify({
    message: 'List recently modified Google Drive files. Return ONLY a JSON array of objects with fields: id, name, type. No explanation, just the raw JSON array. Maximum 10 results.',
    history: [], writableTools: []
  });
  var fullText = '';
  fetch(BACKEND + '?action=chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body })
  .then(function(response) {
    var reader = response.body.getReader(); var decoder = new TextDecoder(); var buf = '';
    function read() {
      reader.read().then(function(result) {
        if (result.done) { parseDriveResults(fullText, resultsEl, 'Recent files'); return; }
        buf += decoder.decode(result.value, { stream: true });
        var lines = buf.split('\n'); buf = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          if (!lines[i].startsWith('data: ')) continue;
          try {
            var ev = JSON.parse(lines[i].slice(6));
            if (ev.type === 'token') fullText += ev.text;
            else if (ev.type === 'done' || ev.type === 'error') { parseDriveResults(fullText, resultsEl, 'Recent files'); return; }
          } catch(e) {}
        }
        read();
      }).catch(function(){ resultsEl.innerHTML = '<div class="drive-empty">Could not load recent files</div>'; });
    }
    read();
  }).catch(function() { resultsEl.innerHTML = '<div class="drive-empty">Could not load recent files</div>'; });
}
function closeDrivePicker() { document.getElementById('drive-modal').classList.remove('open'); }
function driveSearchKey(e)  { if (e.key === 'Enter') runDriveSearch(); }

function runDriveSearch() {
  var q = document.getElementById('drive-search-input').value.trim();
  if (!q) return;
  var resultsEl = document.getElementById('drive-results');
  resultsEl.innerHTML = '<div class="drive-empty">Searching...</div>';

  var body = JSON.stringify({
    message: 'Search Google Drive for files matching "' + q + '". Return ONLY a JSON array of objects with fields: id, name, type. No explanation, just the raw JSON array. Maximum 10 results.',
    history: [], writableTools: []
  });

  var fullText = '';
  fetch(BACKEND + '?action=chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body })
  .then(function(response) {
    var reader = response.body.getReader(); var decoder = new TextDecoder(); var buf = '';
    function read() {
      reader.read().then(function(result) {
        if (result.done) { parseDriveResults(fullText, resultsEl); return; }
        buf += decoder.decode(result.value, { stream: true });
        var lines = buf.split('\n'); buf = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          if (!lines[i].startsWith('data: ')) continue;
          try {
            var ev = JSON.parse(lines[i].slice(6));
            if (ev.type === 'token') fullText += ev.text;
            else if (ev.type === 'done' || ev.type === 'error') { parseDriveResults(fullText, resultsEl, 'Search results'); return; }
          } catch(e) {}
        }
        read();
      }).catch(function(){ resultsEl.innerHTML = '<div class="drive-empty">Search failed</div>'; });
    }
    read();
  }).catch(function() { resultsEl.innerHTML = '<div class="drive-empty">Search failed</div>'; });
}

function parseDriveResults(text, resultsEl, heading) {
  try {
    var raw = text.replace(/```json\n?/g, '').replace(/```/g, '').trim();
    var items = JSON.parse(raw);
    if (!Array.isArray(items) || !items.length) { resultsEl.innerHTML = '<div class="drive-empty">No files found</div>'; return; }
    resultsEl.innerHTML = '';
    if (heading) {
      var h = document.createElement('div');
      h.style.cssText = 'font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;padding:4px 10px 8px;';
      h.textContent = heading;
      resultsEl.appendChild(h);
    }
    items.forEach(function(f) {
      var div = document.createElement('div'); div.className = 'drive-item';
      var shortType = (f.type || '').replace('application/vnd.google-apps.', '').replace('application/', '');
      div.innerHTML = '<span class="di-name">📄 ' + (f.name || 'Untitled') + '</span><span class="di-type">' + shortType + '</span>';
      div.onclick = function() { selectDriveFile(f.id, f.name); };
      resultsEl.appendChild(div);
    });
  } catch(e) { resultsEl.innerHTML = '<div class="drive-empty">Could not parse results</div>'; }
}

function selectDriveFile(fileId, fileName) {
  var p = drivePickerCaller || 'm';
  pendingDriveRef = { fileId: fileId, fileName: fileName };
  pendingAttachment = null;
  renderAttachBadge('📂 ' + fileName, p);
  closeDrivePicker();
}

// ── Main send ─────────────────────────────────────────────────────────────────

function send(text, p) {
  if (busy) return;

  var messageText = text;
  var attachment = pendingAttachment ? { name: pendingAttachment.name, mediaType: pendingAttachment.mediaType, base64Data: pendingAttachment.base64Data } : null;

  if (pendingDriveRef) {
    messageText = text
      ? text + '\n\n[Please read the file "' + pendingDriveRef.fileName + '" (Drive ID: ' + pendingDriveRef.fileId + ') and use its contents to answer.]'
      : 'Please read the file "' + pendingDriveRef.fileName + '" from Google Drive (ID: ' + pendingDriveRef.fileId + ') and summarise or describe its contents.';
  }

  var displayText = text || '';
  if (pendingAttachment) displayText = (displayText ? displayText + '\n' : '') + '📎 ' + pendingAttachment.name;
  if (pendingDriveRef)   displayText = (displayText ? displayText + '\n' : '') + '📂 ' + pendingDriveRef.fileName;

  msgHistory.push({ role: 'user', content: displayText || messageText });
  bubble('user', displayText || messageText, null, p);
  clearAttachment();
  setBusy(true, p);
  var typing = bubble('assistant', '', 'typing', p);

  var params = { message: messageText, history: msgHistory, writableTools: Object.keys(WRITE_TOOLS) };
  if (attachment) params.attachment = attachment;

  streamChat(params, typing, p);
}
</script>
