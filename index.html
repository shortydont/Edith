<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Edith">
<meta name="theme-color" content="#ffffff">
<title>Edith</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --border: #e8e8e4; --border2: #d0d0cb;
  --text: #1c1c1a; --text2: #6b6b62; --text3: #adadA3;
  --bubble-user: #f2f2ef; --send-bg: #1c1c1a; --input-bg: #f2f2ef;
}
html { height: 100%; }
body { height: 100%; margin: 0; font-family: 'Inter', -apple-system, sans-serif; color: var(--text); background: #fff; overflow: hidden; display: flex; flex-direction: column; }

.msg-group { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
.msg-group.user { align-items: flex-end; }
.msg-group.assistant { align-items: flex-start; }
.bubble { padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; border: 1px solid var(--border); }
.msg-group.user .bubble { background: var(--bubble-user); border-bottom-right-radius: 4px; max-width: 78%; }
.msg-group.assistant .bubble { background: #fff; border-bottom-left-radius: 4px; max-width: 86%; }
.bubble.typing { padding: 14px 18px; background: #fff; }
.dots { display: flex; gap: 5px; align-items: center; }
.dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: bop 1.3s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: 0.15s; }
.dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bop { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
.msg-time { font-size: 11px; color: var(--text3); padding: 0 4px; margin-top: 3px; }
.bubble.error { background: #fff5f5; border-color: #fecaca; color: #dc2626; }
.confirm-card { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 16px; border-bottom-left-radius: 4px; padding: 14px 16px; max-width: 86%; font-size: 15px; line-height: 1.6; }
.confirm-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: #b45309; margin-bottom: 6px; }
.confirm-desc { color: #92400e; margin-bottom: 12px; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btn { flex: 1; padding: 10px 14px; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; }
.confirm-btn.yes { background: #1c1c1a; color: white; }
.confirm-btn.no { background: white; color: var(--text2); border-color: var(--border2); }
.fade-in { animation: fadeIn 0.18s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.send-btn { border-radius: 50%; background: var(--send-bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.12s, opacity 0.15s; }
.send-btn:active { transform: scale(0.9); }
.send-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

/* DESKTOP */
@media (min-width: 768px) {
  #mobile-view { display: none !important; }
  #desktop-view { display: flex; flex-direction: column; height: 100%; }
  #d-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 20px; padding: 0 24px; }
  #d-welcome img { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; }
  #d-searchbar { width: 100%; max-width: 580px; display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid var(--border); border-radius: 28px; padding: 12px 12px 12px 22px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); transition: box-shadow 0.2s; }
  #d-searchbar:focus-within { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  #d-searchbar textarea { flex: 1; font-size: 16px; min-height: 26px; max-height: 120px; line-height: 1.5; padding: 0; font-family: inherit; color: var(--text); background: transparent; border: none; outline: none; resize: none; }
  #d-searchbar textarea::placeholder { color: var(--text3); }
  #d-searchbar .send-btn { width: 38px; height: 38px; } #d-searchbar .send-btn svg { width: 15px; height: 15px; }
  #d-chat { display: none; flex-direction: column; flex: 1; max-width: 720px; width: 100%; margin: 0 auto; min-height: 0; }
  #d-chat-header { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #d-chat-header img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
  #d-chat-header span { font-size: 15px; font-weight: 600; }
  #d-chat-header button { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text3); padding: 6px 10px; border-radius: 8px; font-family: inherit; }
  #d-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; scrollbar-width: thin; min-height: 0; }
  #d-inputarea { padding: 14px 20px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
  #d-inputbar { display: flex; align-items: flex-end; gap: 10px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 26px; padding: 10px 10px 10px 20px; }
  #d-inputbar:focus-within { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }
  #d-inputbar textarea { flex: 1; min-height: 26px; max-height: 120px; line-height: 1.5; padding: 0; font-family: inherit; font-size: 15px; color: var(--text); background: transparent; border: none; outline: none; resize: none; }
  #d-inputbar textarea::placeholder { color: var(--text3); }
  #d-inputbar .send-btn { width: 38px; height: 38px; } #d-inputbar .send-btn svg { width: 15px; height: 15px; }
}

/* MOBILE */
@media (max-width: 767px) {
  #desktop-view { display: none !important; }
  #mobile-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #m-header { display: none; align-items: center; padding: 12px 18px; padding-top: calc(env(safe-area-inset-top, 0px) + 12px); border-bottom: 1px solid var(--border); gap: 12px; background: #fff; flex-shrink: 0; }
  #m-header img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
  #m-header .hname { font-size: 17px; font-weight: 600; }
  #m-header .hclear { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text3); padding: 6px 10px; border-radius: 8px; font-family: inherit; }
  #m-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; padding: 24px; text-align: center; }
  #m-welcome img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; }
  #m-welcome h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  #m-messages { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; padding: 16px 16px 8px; display: none; flex-direction: column; gap: 4px; }
  #m-inputwrap { flex-shrink: 0; padding: 10px 16px; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px); background: #fff; border-top: 1px solid var(--border); }
  #m-inputbar { display: flex; align-items: flex-end; gap: 10px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 28px; padding: 10px 10px 10px 18px; }
  #m-inputbar:focus-within { border-color: var(--border2); }
  #m-inputbar textarea { flex: 1; min-height: 28px; max-height: 110px; line-height: 1.55; padding: 2px 0; font-family: inherit; font-size: 17px; color: var(--text); background: transparent; border: none; outline: none; resize: none; }
  #m-inputbar textarea::placeholder { color: var(--text3); }
  #m-inputbar .send-btn { width: 40px; height: 40px; } #m-inputbar .send-btn svg { width: 16px; height: 16px; }
}
</style>
</head>
<body>

<!-- DESKTOP -->
<div id="desktop-view">
  <div id="d-welcome">
    <img id="d-wlogo" alt="Edith">
    <div id="d-searchbar">
      <textarea id="d-input" placeholder="Ask Edith anything…" rows="1" onkeydown="dOnKey(event)" oninput="grow(this)"></textarea>
      <button class="send-btn" id="d-send" onclick="dSend()"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5l-1.4 1.4 5.2 5.2H4v2h11.8l-5.2 5.2L12 20.4l9-9-9-9z" fill="white"/></svg></button>
    </div>
  </div>
  <div id="d-chat">
    <div id="d-chat-header">
      <img id="d-hlogo" alt="Edith"><span>Edith</span>
      <button onclick="dClear()">Clear</button>
    </div>
    <div id="d-messages"></div>
    <div id="d-inputarea">
      <div id="d-inputbar">
        <textarea id="d-cinput" placeholder="Ask Edith anything…" rows="1" onkeydown="dChatOnKey(event)" oninput="grow(this)"></textarea>
        <button class="send-btn" id="d-csend" onclick="dChatSend()"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5l-1.4 1.4 5.2 5.2H4v2h11.8l-5.2 5.2L12 20.4l9-9-9-9z" fill="white"/></svg></button>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE -->
<div id="mobile-view">
  <div id="m-header">
    <img id="m-hlogo" alt="Edith">
    <span class="hname">Edith</span>
    <button class="hclear" onclick="mClear()">Clear</button>
  </div>
  <div id="m-welcome">
    <img id="m-wlogo" alt="Edith">
    <h1>Hi, I'm Edith</h1>
  </div>
  <div id="m-messages"></div>
  <div id="m-inputwrap">
    <div id="m-inputbar">
      <textarea id="m-input" placeholder="Ask Edith anything…" rows="1" onkeydown="mOnKey(event)" oninput="grow(this)"></textarea>
      <button class="send-btn" id="m-send" onclick="mSend()"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5l-1.4 1.4 5.2 5.2H4v2h11.8l-5.2 5.2L12 20.4l9-9-9-9z" fill="white"/></svg></button>
    </div>
  </div>
</div>

var il=document.createElement('link');il.rel='apple-touch-icon';il.href=LOGO;document.head.appendChild(il);
var fl=document.createElement('link');fl.rel='icon';fl.type='image/png';fl.href=LOGO;document.head.appendChild(fl);

var WRITE_TOOLS={
  gmail_move:function(i){return 'Move emails matching "'+i.query+'" to label "'+i.label_name+'"';},
  gmail_label:function(i){return 'Apply label "'+i.label_name+'" to emails matching "'+i.query+'"';},
  gmail_trash:function(i){return 'Trash emails matching "'+i.query+'"';},
  gmail_mark_read:function(i){return 'Mark emails matching "'+i.query+'" as read';},
  gmail_draft:function(i){return 'Create a draft to '+i.to+' — subject: "'+i.subject+'"';},
  cal_create_event:function(i){return 'Create event "'+i.title+'" on '+i.start;},
  cal_delete_event:function(i){return 'Delete calendar event (ID: '+i.event_id+')';},
  tasks_create:function(i){return 'Create task: "'+i.title+'"';},
  tasks_complete:function(i){return 'Mark task complete (ID: '+i.task_id+')';},
  tasks_delete:function(i){return 'Delete task (ID: '+i.task_id+')';}
};

var msgHistory=[],busy=false,dStarted=false,mStarted=false,pending=null;

function callBackend(action, params, onSuccess, onError) {
  fetch(BACKEND + '?action=' + action, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(params)
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data && data.result !== undefined) {
      if (onSuccess) onSuccess(data.result);
    } else if (data && data.error) {
      if (onError) onError(data.error);
    } else {
      if (onSuccess) onSuccess(data);
    }
  })
  .catch(function(err){ if(onError) onError(err.message||'Network error'); });
}

callBackend('loadHistory', {}, function(s){ if(s&&s.length) msgHistory=s; });

function grow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function dScroll(){var m=document.getElementById('d-messages');requestAnimationFrame(function(){m.scrollTop=m.scrollHeight;});}
function mScroll(){var m=document.getElementById('m-messages');requestAnimationFrame(function(){m.scrollTop=m.scrollHeight;});}
function scroll(p){p==='d'?dScroll():mScroll();}

function dOnKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();dSend();}}
function dChatOnKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();dChatSend();}}
function dSend(){var i=document.getElementById('d-input');var t=i.value.trim();if(!t)return;i.value='';i.style.height='auto';dStart();send(t,'d');}
function dChatSend(){var i=document.getElementById('d-cinput');var t=i.value.trim();if(!t)return;i.value='';i.style.height='auto';send(t,'d');}
function dStart(){if(dStarted)return;dStarted=true;document.getElementById('d-welcome').style.display='none';document.getElementById('d-chat').style.display='flex';}
function dBubble(role,text,cls){
  var m=document.getElementById('d-messages');
  var g=document.createElement('div');g.className='msg-group '+role+' fade-in';
  var b=document.createElement('div');b.className='bubble'+(cls?' '+cls:'');
  if(cls==='typing'){b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';}else{b.textContent=text;}
  var ts=document.createElement('div');ts.className='msg-time';ts.textContent=now();
  g.appendChild(b);g.appendChild(ts);m.appendChild(g);dScroll();return b;
}
function dClear(){callBackend('clearHistory',{},function(){msgHistory=[];dStarted=false;document.getElementById('d-messages').innerHTML='';document.getElementById('d-chat').style.display='none';document.getElementById('d-welcome').style.display='flex';});}

function mOnKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();mSend();}}
function mSend(){var i=document.getElementById('m-input');var t=i.value.trim();if(!t)return;i.value='';i.style.height='auto';mStart();send(t,'m');}
function mStart(){if(mStarted)return;mStarted=true;document.getElementById('m-welcome').style.display='none';document.getElementById('m-header').style.display='flex';document.getElementById('m-messages').style.display='flex';}
function mBubble(role,text,cls){
  var m=document.getElementById('m-messages');
  var g=document.createElement('div');g.className='msg-group '+role+' fade-in';
  var b=document.createElement('div');b.className='bubble'+(cls?' '+cls:'');
  if(cls==='typing'){b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';}else{b.textContent=text;}
  var ts=document.createElement('div');ts.className='msg-time';ts.textContent=now();
  g.appendChild(b);g.appendChild(ts);m.appendChild(g);mScroll();return b;
}
function mClear(){callBackend('clearHistory',{},function(){msgHistory=[];mStarted=false;document.getElementById('m-messages').innerHTML='';document.getElementById('m-messages').style.display='none';document.getElementById('m-header').style.display='none';document.getElementById('m-welcome').style.display='flex';});}

function bubble(role,text,cls,p){return p==='d'?dBubble(role,text,cls):mBubble(role,text,cls);}
function setBusy(v,p){busy=v;var b=document.getElementById(p==='d'?'d-csend':'m-send');if(b)b.disabled=v;}

function confirmCard(desc,onYes,onNo,p){
  var m=document.getElementById(p==='d'?'d-messages':'m-messages');
  var g=document.createElement('div');g.className='msg-group assistant fade-in';
  var c=document.createElement('div');c.className='confirm-card';
  var y='cy'+Date.now();var n='cn'+Date.now();
  c.innerHTML='<div class="confirm-label">⚠ Confirm action</div><div class="confirm-desc">'+desc+'</div><div class="confirm-btns"><button class="confirm-btn yes" id="'+y+'">Yes, do it</button><button class="confirm-btn no" id="'+n+'">Cancel</button></div>';
  var ts=document.createElement('div');ts.className='msg-time';ts.textContent=now();
  g.appendChild(c);g.appendChild(ts);m.appendChild(g);scroll(p);
  document.getElementById(y).onclick=function(){c.querySelector('.confirm-btns').innerHTML='<span style="font-size:13px;color:#6b6b62">✓ Confirmed</span>';onYes();};
  document.getElementById(n).onclick=function(){c.querySelector('.confirm-btns').innerHTML='<span style="font-size:13px;color:#6b6b62">✗ Cancelled</span>';onNo();};
}

function send(text,p){
  if(busy)return;
  msgHistory.push({role:'user',content:text});
  bubble('user',text,null,p);
  setBusy(true,p);
  var typing=bubble('assistant','','typing',p);
  callBackend('chat',{message:text,history:msgHistory,writableTools:Object.keys(WRITE_TOOLS)},
    function(r){
      if(!r){typing.className='bubble error';typing.textContent='No response.';setBusy(false,p);return;}
      if(r.needsConfirmation){
        typing.parentElement.remove();
        var desc=WRITE_TOOLS[r.toolName]?WRITE_TOOLS[r.toolName](r.toolInput):'Run: '+r.toolName;
        pending=r.pendingToolCall;
        if(r.history&&r.history.length)msgHistory=r.history;
        confirmCard(desc,
          function(){
            setBusy(true,p);var t2=bubble('assistant','','typing',p);
            callBackend('confirmAndExecute',{pendingToolCall:pending,history:msgHistory},
              function(r2){t2.className='bubble';t2.textContent=(r2&&r2.reply)?r2.reply:'Done!';if(r2&&r2.reply)msgHistory.push({role:'assistant',content:r2.reply});setBusy(false,p);scroll(p);},
              function(e){t2.className='bubble error';t2.textContent='Error: '+e;setBusy(false,p);}
            );
          },
          function(){bubble('assistant','No problem, action cancelled.',null,p);setBusy(false,p);},
          p
        );
      } else {
        typing.className='bubble';typing.textContent=r.reply||'Done!';
        if(r.reply)msgHistory.push({role:'assistant',content:r.reply});
        setBusy(false,p);scroll(p);
      }
    },
    function(err){typing.className='bubble error';typing.textContent='Error: '+err;setBusy(false,p);}
  );
}
